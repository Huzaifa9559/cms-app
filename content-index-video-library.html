<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Content Index — Video Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
::selection{background:#e0e0e0}
input::placeholder{color:#bbb}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
body{font-family:'DM Sans',sans-serif;background:#fafafa;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const THUMBS = [
  "https://picsum.photos/id/1/400/225",
  "https://picsum.photos/id/20/400/225",
  "https://picsum.photos/id/26/400/225",
  "https://picsum.photos/id/43/400/225",
  "https://picsum.photos/id/60/400/225",
  "https://picsum.photos/id/65/400/225",
  "https://picsum.photos/id/96/400/225",
  "https://picsum.photos/id/119/400/225",
  "https://picsum.photos/id/160/400/225",
  "https://picsum.photos/id/180/400/225",
  "https://picsum.photos/id/200/400/225",
  "https://picsum.photos/id/237/400/225",
  "https://picsum.photos/id/274/400/225",
  "https://picsum.photos/id/302/400/225",
  "https://picsum.photos/id/325/400/225",
  "https://picsum.photos/id/366/400/225",
  "https://picsum.photos/id/399/400/225",
  "https://picsum.photos/id/433/400/225",
];

const GRADIENTS = [
  "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)",
  "linear-gradient(135deg, #2d1b69 0%, #11998e 100%)",
  "linear-gradient(135deg, #373b44 0%, #4286f4 100%)",
  "linear-gradient(135deg, #134e5e 0%, #71b280 100%)",
  "linear-gradient(135deg, #c94b4b 0%, #4b134f 100%)",
  "linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%)",
  "linear-gradient(135deg, #3a1c71 0%, #d76d77 50%, #ffaf7b 100%)",
  "linear-gradient(135deg, #0B486B 0%, #F56217 100%)",
  "linear-gradient(135deg, #1f4037 0%, #99f2c8 100%)",
  "linear-gradient(135deg, #3E5151 0%, #DECBA4 100%)",
  "linear-gradient(135deg, #141E30 0%, #243B55 100%)",
  "linear-gradient(135deg, #4B79A1 0%, #283E51 100%)",
  "linear-gradient(135deg, #2C3E50 0%, #FD746C 100%)",
  "linear-gradient(135deg, #0F2027 0%, #203A43 50%, #2C5364 100%)",
  "linear-gradient(135deg, #000428 0%, #004e92 100%)",
  "linear-gradient(135deg, #1D2B64 0%, #F8CDDA 100%)",
  "linear-gradient(135deg, #0D324D 0%, #7F5A83 100%)",
  "linear-gradient(135deg, #232526 0%, #414345 100%)",
];

const VIDEOS = [
  { id: 1, title: "Brand Launch Campaign — Hero Spot", program: "Marketing", state: "Alabama", format: "Main Video", theme: "Brand", status: "Published", year: 2025 },
  { id: 2, title: "Q1 Product Demo — Platform", program: "Product", state: "California", format: "Full Length", theme: "Product", status: "Published", year: 2025 },
  { id: 3, title: "Customer Story — Meridian Health", program: "Customer Success", state: "New York", format: "Interview", theme: "Testimonial", status: "Published", year: 2025 },
  { id: 4, title: "Annual Conference Recap 2025", program: "Events", state: "Texas", format: "Full Length", theme: "Events", status: "Published", year: 2025 },
  { id: 5, title: "Social Teaser — Feature Drop", program: "Marketing", state: "Florida", format: "Teaser", theme: "Product", status: "Draft", year: 2025 },
  { id: 6, title: "CEO Keynote — Future of Work", program: "Leadership", state: "California", format: "Full Length", theme: "Thought Leadership", status: "Published", year: 2025 },
  { id: 7, title: "Employee Spotlight — Engineering", program: "People & Culture", state: "Washington", format: "Interview", theme: "Culture", status: "Published", year: 2024 },
  { id: 8, title: "Partner Webinar — Cloud Migration", program: "Partnerships", state: "Illinois", format: "Full Length", theme: "Education", status: "In Review", year: 2025 },
  { id: 9, title: "Investor Day Highlights", program: "Leadership", state: "New York", format: "Main Video", theme: "Corporate", status: "Published", year: 2024 },
  { id: 10, title: "Dashboard Setup Guide", program: "Product", state: "Oregon", format: "Full Length", theme: "Education", status: "Published", year: 2025 },
  { id: 11, title: "Trade Show B-Roll Pack", program: "Events", state: "Nevada", format: "B-Roll", theme: "Events", status: "Published", year: 2024 },
  { id: 12, title: "Year in Review Promo", program: "Marketing", state: "Georgia", format: "Promo", theme: "Brand", status: "Published", year: 2024 },
  { id: 13, title: "Onboarding Walkthrough v2", program: "Product", state: "Colorado", format: "Full Length", theme: "Education", status: "Draft", year: 2025 },
  { id: 14, title: "Customer Story — TechForward", program: "Customer Success", state: "Massachusetts", format: "Interview", theme: "Testimonial", status: "Published", year: 2025 },
  { id: 15, title: "Company All-Hands Q4 2024", program: "People & Culture", state: "California", format: "Full Length", theme: "Culture", status: "Published", year: 2024 },
  { id: 16, title: "Spring Campaign — 30s TV Spot", program: "Marketing", state: "New York", format: "Promo", theme: "Brand", status: "In Review", year: 2025 },
  { id: 17, title: "Reentry Support Overview", program: "Advocacy", state: "Ohio", format: "Full Length", theme: "Mission", status: "Published", year: 2025 },
  { id: 18, title: "Holiday Giving Campaign", program: "Fundraising", state: "Tennessee", format: "Main Video", theme: "Impact", status: "Published", year: 2024 },
];

const getUnique = (key) => [...new Set(VIDEOS.map(v => v[key]))].sort();

const FilterSection = ({ title, options, selected, onToggle, defaultOpen = false }) => {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={{ borderBottom: "1px solid #f0f0f0", paddingBottom: 16, marginBottom: 16 }}>
      <button onClick={() => setOpen(!open)} style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        width: "100%", background: "none", border: "none", cursor: "pointer", padding: 0, marginBottom: open ? 12 : 0, fontFamily: "'DM Sans', sans-serif",
      }}>
        <span style={{ fontSize: 14, fontWeight: 600, color: "#1a1a1a" }}>{title}</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" strokeWidth="2" style={{ transform: open ? "rotate(0)" : "rotate(180deg)", transition: "transform 0.2s" }}>
          <polyline points="18 15 12 9 6 15"/>
        </svg>
      </button>
      {open && (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {options.map(opt => (
            <label key={opt} style={{ display: "flex", alignItems: "center", gap: 9, cursor: "pointer", fontSize: 13.5, color: "#444", fontFamily: "'DM Sans', sans-serif" }}>
              <input type="checkbox" checked={selected.includes(opt)} onChange={() => onToggle(opt)}
                style={{ width: 16, height: 16, accentColor: "#1a1a1a", cursor: "pointer" }} />
              {opt}
            </label>
          ))}
        </div>
      )}
    </div>
  );
};

const VideoCard = ({ video, index }) => {
  const [hovered, setHovered] = useState(false);
  const [imgLoaded, setImgLoaded] = useState(false);
  const [imgError, setImgError] = useState(false);
  const dur = video.format === "Teaser" ? "0:30" : video.format === "Promo" ? "1:00" : video.format === "Interview" ? "8:45" : "4:22";
  const statusColor = video.status === "Published" ? "#22c55e" : video.status === "Draft" ? "#f59e0b" : "#8b5cf6";
  const gradient = GRADIENTS[index % GRADIENTS.length];
  const thumbUrl = THUMBS[index % THUMBS.length];

  return (
    <div onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{
        background: "#fff", borderRadius: 10, border: "1px solid #eee", overflow: "hidden",
        transition: "all 0.25s",
        boxShadow: hovered ? "0 8px 24px rgba(0,0,0,0.08)" : "0 1px 3px rgba(0,0,0,0.04)",
        transform: hovered ? "translateY(-2px)" : "none", cursor: "pointer",
      }}>
      <div style={{ position: "relative", paddingTop: "56.25%", overflow: "hidden", background: gradient }}>
        {!imgError && (
          <img src={thumbUrl} alt="" loading="lazy"
            onLoad={() => setImgLoaded(true)}
            onError={() => setImgError(true)}
            style={{
              position: "absolute", top: 0, left: 0, width: "100%", height: "100%",
              objectFit: "cover", transition: "transform 0.4s, opacity 0.3s",
              transform: hovered ? "scale(1.04)" : "scale(1)",
              opacity: imgLoaded ? 1 : 0,
            }} />
        )}
        {(imgError || !imgLoaded) && (
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
            <span style={{ color: "rgba(255,255,255,0.75)", fontSize: 13, fontWeight: 600, textAlign: "center", fontFamily: "'DM Sans', sans-serif", textShadow: "0 1px 3px rgba(0,0,0,0.3)" }}>
              {video.title}
            </span>
          </div>
        )}
        <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,0.3) 100%)", pointerEvents: "none" }} />
        <div style={{
          position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)",
          width: 40, height: 40, borderRadius: "50%", background: "rgba(255,255,255,0.9)",
          display: "flex", alignItems: "center", justifyContent: "center",
          opacity: hovered ? 1 : 0, transition: "opacity 0.2s",
          boxShadow: "0 2px 8px rgba(0,0,0,0.15)",
        }}>
          <div style={{ width: 0, height: 0, borderTop: "7px solid transparent", borderBottom: "7px solid transparent", borderLeft: "12px solid #1a1a1a", marginLeft: 2 }} />
        </div>
        <div style={{ position: "absolute", bottom: 8, right: 8, background: "rgba(0,0,0,0.75)", color: "#fff", padding: "2px 7px", borderRadius: 4, fontSize: 11, fontWeight: 600, fontFamily: "'DM Sans', sans-serif" }}>{dur}</div>
        <div style={{ position: "absolute", top: 8, right: 8, background: "#1a1a1a", color: "#fff", padding: "3px 8px", borderRadius: 4, fontSize: 10.5, fontWeight: 600, fontFamily: "'DM Sans', sans-serif" }}>{video.format}</div>
      </div>
      <div style={{ padding: "14px 16px 16px", textAlign: "center" }}>
        <h3 style={{ margin: "0 0 6px", fontSize: 14, fontWeight: 600, color: "#1a1a1a", fontFamily: "'DM Sans', sans-serif", lineHeight: 1.35, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{video.title}</h3>
        <p style={{ margin: "0 0 3px", fontSize: 12.5, color: "#888", fontFamily: "'DM Sans', sans-serif" }}>{video.program}</p>
        <p style={{ margin: "0 0 3px", fontSize: 12.5, color: "#888", fontFamily: "'DM Sans', sans-serif" }}>{video.theme} · {video.year}</p>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 5, margin: "8px 0 12px" }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: statusColor, display: "inline-block" }} />
          <span style={{ fontSize: 11.5, color: "#666", fontWeight: 500, fontFamily: "'DM Sans', sans-serif" }}>{video.status}</span>
        </div>
        <button style={{
          background: "#1a1a1a", color: "#fff", border: "none",
          padding: "8px 28px", borderRadius: 6, fontSize: 13, fontWeight: 600,
          fontFamily: "'DM Sans', sans-serif", cursor: "pointer", transition: "background 0.2s",
        }}
          onMouseEnter={e => e.currentTarget.style.background = "#333"}
          onMouseLeave={e => e.currentTarget.style.background = "#1a1a1a"}
        >View</button>
      </div>
    </div>
  );
};

const NavIcon = ({ children, active }) => (
  <div style={{
    width: 40, height: 40, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center",
    background: active ? "#333" : "transparent", color: active ? "#fff" : "#888",
    cursor: "pointer", transition: "all 0.15s",
  }}>{children}</div>
);

function App() {
  const [search, setSearch] = useState("");
  const [filters, setFilters] = useState({ program: [], format: [], status: [], theme: [], year: [] });
  const [locationState, setLocationState] = useState("");
  const [page, setPage] = useState(1);
  const perPage = 9;

  const toggle = (key, val) => { setFilters(f => ({ ...f, [key]: f[key].includes(val) ? f[key].filter(v => v !== val) : [...f[key], val] })); setPage(1); };
  const clearAll = () => { setFilters({ program: [], format: [], status: [], theme: [], year: [] }); setLocationState(""); setSearch(""); setPage(1); };
  const hasFilters = Object.values(filters).some(a => a.length > 0) || locationState || search;

  const filtered = useMemo(() => {
    return VIDEOS.filter(v => {
      if (search && !Object.values(v).some(val => String(val).toLowerCase().includes(search.toLowerCase()))) return false;
      if (filters.program.length && !filters.program.includes(v.program)) return false;
      if (filters.format.length && !filters.format.includes(v.format)) return false;
      if (filters.status.length && !filters.status.includes(v.status)) return false;
      if (filters.theme.length && !filters.theme.includes(v.theme)) return false;
      if (filters.year.length && !filters.year.includes(String(v.year))) return false;
      if (locationState && v.state !== locationState) return false;
      return true;
    });
  }, [search, filters, locationState]);

  const totalPages = Math.ceil(filtered.length / perPage);
  const paginated = filtered.slice((page - 1) * perPage, page * perPage);

  return (
    <div style={{ display: "flex", height: "100vh", background: "#fafafa", fontFamily: "'DM Sans', sans-serif" }}>
      {/* Icon Sidebar */}
      <div style={{ width: 56, background: "#1a1a1a", display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 16, gap: 6, flexShrink: 0 }}>
        <div style={{ width: 36, height: 36, borderRadius: 8, background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L22 20H2L12 2Z" fill="#1a1a1a"/><circle cx="12" cy="15" r="2.5" fill="#fff"/></svg>
        </div>
        <NavIcon><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></NavIcon>
        <NavIcon><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></NavIcon>
        <NavIcon active><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="m10 9 5 3-5 3V9z"/></svg></NavIcon>
        <NavIcon><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></NavIcon>
        <NavIcon><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></NavIcon>
        <NavIcon><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></NavIcon>
        <NavIcon><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></NavIcon>
        <NavIcon><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></NavIcon>
        <NavIcon><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg></NavIcon>
        <div style={{ flex: 1 }} />
        <NavIcon><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></NavIcon>
        <div style={{ height: 16 }} />
      </div>

      {/* Filter Sidebar */}
      <div style={{ width: 280, background: "#fff", borderRight: "1px solid #eee", padding: "20px 20px 20px 22px", overflowY: "auto", flexShrink: 0 }}>
        <div style={{ position: "relative", marginBottom: 20 }}>
          <input type="text" placeholder="Search by filters" value={search}
            onChange={e => { setSearch(e.target.value); setPage(1); }}
            style={{ width: "100%", padding: "10px 36px 10px 14px", borderRadius: 6, border: "1px solid #e0e0e0", fontSize: 13.5, color: "#333", fontFamily: "'DM Sans', sans-serif", outline: "none", background: "#fff" }}
            onFocus={e => e.target.style.borderColor = "#999"} onBlur={e => e.target.style.borderColor = "#e0e0e0"} />
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb" strokeWidth="2.5" style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)" }}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h2 style={{ fontSize: 18, fontWeight: 700, color: "#1a1a1a" }}>Filters</h2>
          {hasFilters && <button onClick={clearAll} style={{ background: "none", border: "none", fontSize: 13, color: "#888", cursor: "pointer", fontWeight: 500, fontFamily: "'DM Sans', sans-serif" }}>Clear Filter</button>}
        </div>
        <FilterSection title="Program" options={getUnique("program")} selected={filters.program} onToggle={v => toggle("program", v)} defaultOpen />
        <FilterSection title="Format" options={getUnique("format")} selected={filters.format} onToggle={v => toggle("format", v)} defaultOpen />
        <div style={{ borderBottom: "1px solid #f0f0f0", paddingBottom: 16, marginBottom: 16 }}>
          <span style={{ fontSize: 14, fontWeight: 600, color: "#1a1a1a", display: "block", marginBottom: 12, fontFamily: "'DM Sans', sans-serif" }}>Location</span>
          <select value={locationState} onChange={e => { setLocationState(e.target.value); setPage(1); }}
            style={{ width: "100%", padding: "9px 12px", borderRadius: 6, border: "1px solid #e0e0e0", fontSize: 13, color: "#666", fontFamily: "'DM Sans', sans-serif", background: "#fff", cursor: "pointer", outline: "none" }}>
            <option value="">State</option>
            {getUnique("state").map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <FilterSection title="Status" options={getUnique("status")} selected={filters.status} onToggle={v => toggle("status", v)} />
        <FilterSection title="Theme" options={getUnique("theme")} selected={filters.theme} onToggle={v => toggle("theme", v)} />
        <FilterSection title="Year" options={getUnique("year").map(String)} selected={filters.year} onToggle={v => toggle("year", v)} />
      </div>

      {/* Main Content */}
      <div style={{ flex: 1, padding: "28px 36px", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28 }}>
          <h1 style={{ fontSize: 22, fontWeight: 700, color: "#1a1a1a" }}>Content Index — Video Library</h1>
          <span style={{ fontSize: 14, color: "#888" }}><span style={{ fontWeight: 700, color: "#1a1a1a" }}>{filtered.length}</span> videos found</span>
        </div>
        {paginated.length > 0 ? (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 22 }}>
            {paginated.map((v) => <VideoCard key={v.id} video={v} index={VIDEOS.indexOf(v)} />)}
          </div>
        ) : (
          <div style={{ textAlign: "center", padding: "80px 20px" }}>
            <div style={{ fontSize: 44, marginBottom: 14, opacity: 0.25 }}>🎬</div>
            <p style={{ fontSize: 15, color: "#888", fontWeight: 500 }}>No videos match your filters</p>
          </div>
        )}
        {totalPages > 0 && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 36, paddingTop: 20 }}>
            <span style={{ fontSize: 13.5, color: "#888", fontFamily: "'DM Sans', sans-serif" }}>Showing {Math.min((page-1)*perPage+1, filtered.length)}–{Math.min(page*perPage, filtered.length)} of {filtered.length} Results</span>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <button onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1}
                style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "none", fontSize: 13.5, color: page === 1 ? "#ccc" : "#666", cursor: page === 1 ? "default" : "pointer", fontWeight: 500, fontFamily: "'DM Sans', sans-serif" }}>← Previous</button>
              {Array.from({ length: totalPages }, (_, i) => i+1).map(p => (
                <button key={p} onClick={() => setPage(p)} style={{
                  width: 32, height: 32, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center",
                  background: p === page ? "#fff" : "transparent", border: p === page ? "1.5px solid #1a1a1a" : "1.5px solid transparent",
                  fontSize: 13, fontWeight: 600, color: "#1a1a1a", cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                }}>{p}</button>
              ))}
              <button onClick={() => setPage(p => Math.min(totalPages, p+1))} disabled={page === totalPages}
                style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "none", fontSize: 13.5, color: page === totalPages ? "#ccc" : "#666", cursor: page === totalPages ? "default" : "pointer", fontWeight: 500, fontFamily: "'DM Sans', sans-serif" }}>Next →</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
